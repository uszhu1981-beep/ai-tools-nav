name: 每日自动更新 AI 工具导航

on:
  schedule:
    # UTC 01:30 = 北京时间 09:30，对齐每日资讯节奏
    - cron: "30 1 * * *"
  workflow_dispatch:   # 允许在 Actions 页面手动触发

permissions:
  contents: write    # 允许把生成的 index.html 提交回仓库

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: 运行采集生成器
        run: python3 generate.py

      - name: 提交并推送 index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "内容无变化，跳过提交"
          else
            git commit -m "自动更新：每日 AI 资讯 $(date +'%Y-%m-%d %H:%M %Z')"
            git push
            echo "已推送更新"
          fi
