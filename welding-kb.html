<style>

  .kb-title { font-size: 24px; font-weight: 700; }

<script>

const STORAGE_KEY = 'welding_kb_v1';
let articles = [];
let currentFilter = 'all';
let currentSearch = '';
let currentArticle = null;

// Default articles (from WeldingHome knowledge)
const DEFAULT_ARTICLES = [
  {
    id: 'a1', title: '涂胶工艺调试要点', category: 'gluing',
    tags: ['涂胶', '机器人', '参数'],
    content: `## 工装设计阶段
- **涂胶台角度**建议 ≤ 30°，过大则胶条易脱落
- 涂胶胎/抓手定位精度和足够支撑，避免波动剐蹭胶嘴

## 涂胶编程要点
- 涂胶程序(glue on/off)后一点为涂胶开始/结束位置
- 涂胶轨迹开关胶信号前、后第一个过渡点必须为 **LIN**
- 开胶信号前过渡点：在开胶点正前方不能过高
- 关胶信号后过渡点：在关胶点顺延的后方
- 采用**拉涂模式**（非推涂），胶枪倾斜角度 3°
- **挤涂模式**下胶嘴距离 = 胶段直径，**喷涂模式**下 = 3-8mm
- LIN 必须有 CONT，两点不能在同一个位置
- 角度变化大时，涂胶速度从快到慢`
  },
  {
    id: 'a2', title: '焊接直径与焊核直径计算', category: 'quality',
    tags: ['焊接', '质量标准', '计算'],
    content: `## 基本概念
- "焊点直径"非专业名词，考核指标是 **焊接直径(dp)** 和 **焊核直径(dL)**

## 焊接直径 dp 计算公式
- **dp = 2 × tmin + 3**（部分厂商用 3.8 或 4.2 系数）
- tmin = 两层板中较薄的一层厚度

## 焊核直径 dL
- 在截面处测量
- 两层板连接：只有一个焊接直径 & 焊核直径值
- 三层板连接：计算方式参考截面测量
- 部分制造商按车身部位/安全等级标注焊核参考值`
  },
  {
    id: 'a3', title: '点焊机器人自动重焊功能配置', category: 'robot',
    tags: ['机器人', '点焊', '重焊', '配置'],
    content: `## 功能原理
- 焊点报错后，机器人判断错误类型，再次触发焊接

## 关键变量
- **ERR_REPAT**：触发重焊的报错类型
  - #NON = 关闭（默认）
  - #Q_STOP = Q-Stop报错后重焊
  - #NO_Q_STOP = 非Q-Stop报错后重焊
  - #WLD_ERROR_ALL = 所有焊接错误都重焊
- **MAX_REPEAT_AFTER_ERR**：允许重复焊接次数（默认0）

## 配置步骤
1. 登录专家权限，打开变量查询/赋值界面
2. ERR_REPAT 由 #NON 赋值改为 #Q_STOP
3. MAX_REPEAT_AFTER_ERR 由 0 改为 1
4. 程序逻辑：Reset fault and Reweld信号 true → 复位错误并再次焊接`
  },
  {
    id: 'a4', title: 'FDS/流钻设备故障排查：超出最大深度', category: 'fds',
    tags: ['FDS', '流钻', '故障', '深度传感器'],
    content: `## 故障现象
- WEBER 流钻设备频繁报"超出最大深度"
- 外观无异常，深度传感器接线无松动

## 排查过程
1. 检查刀杆无明显磨损
2. 深度零位标定补偿值 26.2 → 24.6mm（变小1.6mm）
3. 再次标定 24.6 → 23.1mm（进一步变小1.5mm）
4. 初步怀疑深度传感器异常
5. 更换深度传感器后仍然无效
6. 拆开机械结构检查磁环 → **磁环碎裂**（根本原因）
7. 更换磁环 → 重新深度零点标定 → 恢复正常

## 故障分析逻辑
引起深度/位置异常的两大方向：
- **硬件损坏**影响刀杆和支架位置
- **测量环节异常**反馈（本案例属于此类）

## 磁性位置传感器原理
- 非接触式监测缸体活塞上磁环位置
- 内置霍尔效应元件探测磁场变化
- 输出连续(0-10V)模拟信号 → 转换为mm
- 分辨率 ≥ 0.05mm，线性误差 ≤ 0.3mm，重复精度 0.1mm`
  },
  {
    id: 'a5', title: 'FANUC机器人World Frame异常处理', category: 'robot',
    tags: ['FANUC', '机器人', '坐标系', 'World Frame'],
    content: `## 问题场景
- 车间量产阶段发现机器人工具坐标和车身坐标偏差很大
- 检查发现：通用世界坐标系与实际不符
- 根本原因：机器人的多个轴在机械位置距离零点刻度线相差20mm的情况下进行了零点标定

## 解决方案思路
1. 在程序里找一个特征明显的参考点（如工件尖角），记录当前错误坐标值
2. 正确标零后，手动移动机器人到同一个物理位置，记录新的正确坐标值
3. 计算差值（ΔX, ΔY, ΔZ, ΔW, ΔP, ΔR）
4. 在示教器坐标系设置界面，修改当前用户坐标系，将差值加进去
5. 核心问题：机器人系统能否根据两次零点对应的编码器差值，判断世界坐标差异然后整体偏移轨迹？`
  },
  {
    id: 'a6', title: '焊点压痕深度判定标准', category: 'quality',
    tags: ['压痕', '质量标准', '焊点'],
    content: `## 压痕深度判定标准
- **外观要求高**的焊点，车辆设计时可能给出相应指标
- **无特殊要求**的焊点，规范为：焊接后的焊点厚度不能小于焊点总板层厚度的 **60%**
- 即 **压痕深度 ≤ 板层总厚度的 40%**`
  },
  {
    id: 'a7', title: '点焊飞溅优化方法论', category: 'welding',
    tags: ['飞溅', '优化', '点焊', '参数'],
    content: `## 核心理念
- 优化必须建立在收集飞溅数据基础上，是**针对性**优化，不是"面对性"优化
- 优化需要多批次循环
- 对优化发现的问题整理归档

## 数据收集三原则
1. 飞溅数据统计必须是**多次的**，不能单一次
2. 每次统计焊点焊接次数尽量 **≥ 20次**
3. 飞溅数据分类整理：按**单个焊点**、按**焊枪**、按**区域**

## 数据分析三层次
1. 单个焊点：通过多次飞溅率波动幅度分析不稳定因素
2. 焊枪维度：多车型共线时，某焊枪对所有车型飞溅都有变化 → 检查设备工作状态
3. 区域维度：了解不同材质板材及搭接特性

## 优化筛选逻辑
1. 初期只选择 **5%** 最糟糕的飞溅焊点优化
2. 每个区域 **5%-10%** 最糟糕焊点，先进行两轮
3. 然后主要针对参数优化，也进行两轮
4. 筛选出参数优化后飞溅仍不下降的焊点，参照白车身进行原因分析
5. 建议每个焊点建立档案`
  },
  {
    id: 'a8', title: '飞溅根因分析：四大维度', category: 'welding',
    tags: ['飞溅', '根因', '点焊', 'Rexroth'],
    content: `## 飞溅根因四大维度
### 1. 钣金间隙过大
- 冲压精度不良 → 板间间隙大 → 焊枪压力被抵消 → 接触电阻↑ → 极速升温 → 塑性环未闭合 → 爆破飞溅

### 2. 结构胶高温气化
- 胶水溢出阻断导电路 → 局部电流密度过高 → 胶热分解气化 → "爆燃"喷射

### 3. 双热成型钢+单层薄板三层板热失衡
- 热量富集高电阻率界面 → 薄板不熔化 → 加电流 → 过热飞溅

### 4. 焊枪对中不良+压力漂移
- 偏心挤压/欠压 → 早期喷射飞溅

## Rexroth UIR自适应控制
- 1kHz中频逆变+PSG6000 → 毫秒级V/I采样 → 动态电阻计算 → 闭环跟踪参考曲线
- Q-Module：PSF稳定性因子+UIP质量因子 → 100%在线追溯
- **参考曲线偏离机理**：电极帽磨损+板材波动 → 实测电阻偏低 → 误判"能量不足" → 过量补偿 → 越补越飞溅

// ======================== INIT ========================
function init() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try { articles = JSON.parse(saved); } catch(e) { articles = []; }
  }
  if (articles.length === 0) {
    articles = DEFAULT_ARTICLES.map(a => ({...a, id: 'a' + Date.now() + Math.random().toString(36).substr(2,4)}));
    saveData();
  }
  render();
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(articles));
}

// ======================== RENDER ========================
function render() {
  updateCounts();
  updateStats();
  let filtered = getFiltered();
  document.getElementById('resultCount').textContent = filtered.length ? `（${filtered.length} 篇）` : '';
  renderList(filtered);
}

function updateCounts() {
  const cats = {};
  articles.forEach(a => { cats[a.category] = (cats[a.category] || 0) + 1; });
  document.getElementById('countAll').textContent = articles.length;
  const catMap = {welding:'countWelding', gluing:'countGluing', fds:'countFds', robot:'countRobot', quality:'countQuality'};
  Object.keys(catMap).forEach(k => {
    document.getElementById(catMap[k]).textContent = cats[k] || 0;
  });
}

function updateStats() {
  document.getElementById('statTotal').textContent = articles.length;
  const cats = new Set(articles.map(a => a.category));
  document.getElementById('statCats').textContent = cats.size;
  const chars = articles.reduce((s, a) => s + (a.content || '').length, 0);
  document.getElementById('statChars').textContent = chars.toLocaleString();
}

function getFiltered() {
  let result = [...articles];
  if (currentFilter !== 'all') {
    result = result.filter(a => a.category === currentFilter);
  }
  if (currentSearch.trim()) {
    const q = currentSearch.trim().toLowerCase();
    result = result.filter(a =>
      (a.title || '').toLowerCase().includes(q) ||
      (a.content || '').toLowerCase().includes(q) ||
      (a.tags || []).some(t => t.toLowerCase().includes(q))
    );
  }
  return result;
}

function renderList(items) {
  const grid = document.getElementById('articleGrid');
  if (items.length === 0) {
    grid.innerHTML = `<div class="empty"><div class="icon">📭</div><div>没有找到匹配的知识条目</div></div>`;
    return;
  }
  grid.innerHTML = items.map(a => {
    const catLabel = {welding:'🔥点焊', gluing:'🧪涂胶', fds:'🔩FDS', robot:'🤖机器人', quality:'📊质量'}[a.category] || a.category;
    const preview = (a.content || '').replace(/<[^>]+>/g,'').substring(0,120);
    const q = currentSearch.trim();
    let highlighted = preview;
    if (q) {
      const re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
      highlighted = preview.replace(re, m => `<span class="highlight">${m}</span>`);
    }
    return `<div class="article-card" onclick="showDetail('${a.id}')">
      <div class="title">${a.title} <span class="tag tag-${a.category}">${catLabel}</span></div>
      <div class="meta">🏷 ${(a.tags||[]).join(' · ')}</div>
      <div class="preview">${highlighted}</div>
    </div>`;
  }).join('');
}

// ======================== DETAIL ========================
function showDetail(id) {
  const a = articles.find(x => x.id === id);
  if (!a) return;
  currentArticle = a;
  document.getElementById('articleGrid').style.display = 'none';
  document.getElementById('detailView').style.display = 'block';
  const catLabel = {welding:'🔥点焊', gluing:'🧪涂胶', fds:'🔩FDS', robot:'🤖机器人', quality:'📊质量'}[a.category] || a.category;
  document.getElementById('detailView').innerHTML = `
    <div class="back" onclick="backToList()">← 返回知识列表</div>
    <h2>${a.title} <span class="tag tag-${a.category}">${catLabel}</span></h2>
    <div class="meta" style="margin-bottom:16px">🏷 ${(a.tags||[]).join(' · ')}</div>
    <div class="content">${renderContent(a.content)}</div>
    <div class="qa-section">
      <h3>🤖 AI 智能问答</h3>
      <div class="qa-input">
        <input id="qaInput" placeholder="输入问题，例如：飞溅怎么优化？">
        <button class="btn btn-primary" onclick="askQuestion()">提问</button>
      </div>
      <div class="qa-answer" id="qaAnswer"></div>
    </div>`;
}

function renderContent(md) {
  if (!md) return '';
  let html = md;
  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^# (.+)$/gm, '<h3 style="color:var(--accent);font-size:18px">$1</h3>');
  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--primary-light)">$1</strong>');
  // Lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
  // Tables
  html = html.replace(/\|(.+)\|/g, (m) => {
    if (m.includes('---')) return '<hr style="border-color:var(--border);margin:4px 0">';
    const cells = m.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
    return `<tr>${cells}</tr>`;
  });
  html = html.replace(/(<tr>.*<\/tr>)/s, '<table>$1</table>');
  // Line breaks
  html = html.replace(/\n\n/g, '</p><p>');
  html = html.replace(/\n/g, '<br>');
  return '<p>' + html + '</p>';
}

function backToList() {
  document.getElementById('articleGrid').style.display = '';
  document.getElementById('detailView').style.display = 'none';
  currentArticle = null;
}

// ======================== FILTER & SEARCH ========================
function filterBy(cat, btn) {
  document.querySelectorAll('.nav-item[data-cat]').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  currentFilter = cat;
  render();
}

function searchArticles(q) {
  currentSearch = q;
  render();
}

// ======================== IMPORT ========================
function toggleImport() {
  const area = document.getElementById('importArea');
  area.style.display = area.style.display === 'none' ? 'block' : 'none';
}

function importArticles() {
  const text = document.getElementById('importText').value.trim();
  if (!text) { showToast('请输入要导入的内容'); return; }
  const blocks = text.split(/^---$/m).filter(b => b.trim());
  let added = 0;
  blocks.forEach(block => {
    const lines = block.trim().split('\n');
    let title = '未命名条目';
    let category = 'welding';
    let content = block;
    let tags = [];
    // Try to parse header
    const titleMatch = block.match(/^标题[：:]\s*(.+)/m);
    const catMatch = block.match(/^分类[：:]\s*(.+)/m);
    const tagMatch = block.match(/^标签[：:]\s*(.+)/m);
    if (titleMatch) title = titleMatch[1].trim();
    if (catMatch) {
      const c = catMatch[1].trim().toLowerCase();
      if (['welding','gluing','fds','robot','quality'].includes(c)) category = c;
    }
    if (tagMatch) tags = tagMatch[1].split(/[,，、\s]+/).filter(t => t.trim());
    // Remove header lines from content
    content = block.replace(/^标题[：:].+$/m, '').replace(/^分类[：:].+$/m, '').replace(/^标签[：:].+$/m, '').trim();
    if (!tags.length) tags = [title.substring(0,4)];
    articles.push({
      id: 'a' + Date.now() + Math.random().toString(36).substr(2,4),
      title, category, tags, content
    });
    added++;
  });
  if (added > 0) {
    saveData();
    render();
    document.getElementById('importText').value = '';
    toggleImport();
    showToast(`✅ 成功导入 ${added} 篇知识`);
  }
}

// ======================== EXPORT ========================
function exportData() {
  const data = JSON.stringify(articles, null, 2);
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'welding-knowledge-base.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('✅ 数据已导出');
}

// ======================== AI QA ========================
// Uses Hermes Agent's own intelligence for Q&A
function askQuestion() {
  const input = document.getElementById('qaInput');
  const q = input.value.trim();
  if (!q) return;
  const answer = document.getElementById('qaAnswer');
  answer.className = 'qa-answer show';
  answer.innerHTML = '<div class="loading">🤔 正在基于知识库思考...</div>';
  
  // Find relevant articles
  const qLower = q.toLowerCase();
  const relevant = articles.filter(a =>
    (a.title || '').toLowerCase().includes(qLower) ||
    (a.content || '').toLowerCase().includes(qLower) ||
    (a.tags || []).some(t => t.toLowerCase().includes(qLower))
  );
  
  // Build context from relevant articles
  let context = '';
  if (relevant.length > 0) {
    context = '相关知识点：\n\n' + relevant.slice(0, 3).map(a => 
      `[${a.title}] ${a.content.substring(0, 500)}`
    ).join('\n\n---\n\n');
  }
  
  // Generate answer using local matching + smart response
  const answerText = generateAnswer(q, relevant);
  setTimeout(() => {
    answer.innerHTML = answerText;
  }, 800);
}

function generateAnswer(q, relevant) {
  if (relevant.length === 0) {
    return `<p>📭 知识库中暂未找到直接相关的条目。以下是一些建议：</p>
    <ul style="margin-top:8px;color:var(--text-dim)">
      <li>尝试用不同的关键词搜索</li>
      <li>导入更多相关知识到知识库</li>
      <li>你可以在微信中直接问我，我能给出更全面的回答</li>
    </ul>`;
  }
  
  const qLower = q.toLowerCase();
  let answer = '';
  
  // Check for common questions
  if (qLower.includes('飞溅') && (qLower.includes('优化') || qLower.includes('解决') || qLower.includes('高'))) {
    answer = `<p><strong>🔧 飞溅优化核心步骤：</strong></p>
    <ol>
      <li><strong>数据收集</strong> — 每个焊点统计 ≥20 次焊接数据，按焊点/焊枪/区域分类</li>
      <li><strong>四轮筛选法</strong>
        <br>第1-2轮：选每个区域 5%-10% 最差焊点优化
        <br>第3-4轮：调参数（电流↓、压力↑、时间调整）</li>
      <li><strong>根因排查</strong>（四大维度 👇）
        <br>🔥 钣金间隙过大 → 控制冲压精度
        <br>🔥 结构胶气化 → 检查胶水溢出
        <br>🔥 热失衡 → 三层板电流分配
        <br>🔥 焊枪对中不良/压力漂移 → 校准</li>
    </ol>`;
  } else if (qLower.includes('涂胶') || qLower.includes('胶')) {
    answer = `<p><strong>🧪 涂胶工艺要点：</strong></p>
    <ul>
      <li>涂胶台角度 ≤ 30°</li>
      <li>拉涂模式，胶枪倾斜 3°</li>
      <li>挤涂：胶嘴距离 = 胶段直径</li>
      <li>喷涂：胶嘴距离 = 3-8mm</li>
      <li>开关胶前后第一个过渡点必须为 LIN</li>
      <li>LIN 必须有 CONT 指令</li>
    </ul>`;
  } else if (qLower.includes('直径') || qLower.includes('焊核') || qLower.includes('压痕')) {
    answer = `<p><strong>📊 焊接质量标准：</strong></p>
    <ul>
      <li><strong>焊接直径 dp</strong> = 2 × tmin + 3（tmin = 薄板厚度）</li>
      <li><strong>压痕深度</strong> ≤ 板层总厚度的 40%</li>
      <li>焊点厚度 ≥ 总板层厚度的 60%</li>
    </ul>`;
  } else if (qLower.includes('重焊') || qLower.includes('err_re')) {
    answer = `<p><strong>🔄 自动重焊配置：</strong></p>
    <ol>
      <li>登录专家权限</li>
      <li>ERR_REPAT 改为 #Q_STOP（Q-Stop报错后重焊）</li>
      <li>MAX_REPEAT_AFTER_ERR 改为 1</li>
      <li>Reset fault and Reweld 信号 true</li>
    </ol>`;
  } else if (qLower.includes('fds') || qLower.includes('流钻') || qLower.includes('深度')) {
    answer = `<p><strong>🔩 FDS/流钻故障排查：</strong></p>
    <ul>
      <li>"超出最大深度" → 检查磁环是否碎裂</li>
      <li>深度零位标定值异常变小 → 磁环损坏信号</li>
      <li>更换磁环后重新深度零点标定即可恢复</li>
    </ul>`;
  } else if (qLower.includes('world') || qLower.includes('坐标系') || qLower.includes('fanuc')) {
    answer = `<p><strong>🤖 FANUC World Frame 异常处理：</strong></p>
    <ol>
      <li>找参考点记录错误坐标</li>
      <li>正确标零后移动到同一点记录正确坐标</li>
      <li>计算 ΔX/ΔY/ΔZ/ΔW/ΔP/ΔR</li>
      <li>在坐标系设置界面修改用户坐标系</li>
    </ol>`;
  } else {
    // General answer from relevant articles
    answer = `<p>📚 找到 <strong>${relevant.length}</strong> 篇相关条目：</p>
    <ul>${relevant.slice(0, 3).map(a => `<li><strong>${a.title}</strong> — ${(a.content || '').replace(/<[^>]+>/g,'').substring(0, 120)}...</li>`).join('')}</ul>
    <p style="margin-top:8px;color:var(--text-dim)">💡 点击知识条目查看完整内容，或在微信中向我提问获取更详细的解答。</p>`;
  }
  return answer;
}

  const t = document.getElementById('toast');
  t.textContent = msg;

}
